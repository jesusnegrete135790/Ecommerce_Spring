version: '3.8'

services:

  db-ecommerce:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  api-ecommerce:
    build: .
    container_name: spring-api
    ports:
      - "8080:8080"
    environment:
      - DB_PASSWORD=${DB_PASS}

      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-ecommerce:5432/${DB_NAME}
    depends_on:
      - db-ecommerce


volumes:
  postgres_data: